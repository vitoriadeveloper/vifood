name: 1. Build, Test & PR to develop

on:
  push:
    branches:
      - 'feature/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Run tests
        run: mvn test

  create-pr-to-develop:
    name: Create PR to develop
    needs: build-and-test
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request to develop
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '[AUTO] Merge ${{ github.ref_name }} to develop'
          body: |
            ## 🤖 PR Automática - CI/CD Pipeline
            
            **Branch de origem:** `${{ github.ref_name }}`
            **Destino:** `develop`
            
            ### ✅ Status
            - Build: ✅ Passou
            - Testes: ✅ Passaram
            
            Esta PR foi criada automaticamente pela pipeline CI/CD.
          base: develop
          head: ${{ github.ref_name }}
          delete-branch: false
          draft: false


