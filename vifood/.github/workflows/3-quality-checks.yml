name: 3. Quality Checks

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  quality-checks:
    name: SonarQube Analysis & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and analyze with SonarQube
        run: |
          mvn clean compile test \
            -Dsonar.projectKey=vifood \
            -Dsonar.sources=src/main \
            -Dsonar.tests=src/test
        continue-on-error: true

  lint-and-format:
    name: Code Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run PMD (Code Analysis)
        run: mvn pmd:check
        continue-on-error: true

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: true

