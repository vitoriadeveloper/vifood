name: 5. Automated Release

on:
  push:
    branches:
      - main
    paths:
      - 'pom.xml'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version-update:
    name: Check and Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(grep '<version>' pom.xml | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: ${{ steps.tag_check.outputs.exists == 'false' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Release ${{ steps.version.outputs.version }}
            
            Esta é uma release automática gerada pela pipeline CI/CD.
            
            ### 📦 Artifacts
            - Build JAR disponível em Actions
            - Docker image disponível em Container Registry
            
            ### 📝 Changelog
            Verifique os commits inclusos nesta release no GitHub.
          draft: false
          prerelease: false

